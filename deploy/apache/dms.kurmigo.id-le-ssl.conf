<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName dms.kurmigo.id
    DocumentRoot /var/www/kurmigo-dms/public

    <Directory /var/www/kurmigo-dms/public>
        AllowOverride All
        Require all granted
    </Directory>

    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/kurmigo-dms.sock|fcgi://localhost/"
    </FilesMatch>

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader set X-Forwarded-Host "dms.kurmigo.id"

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/dms.kurmigo.id/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/dms.kurmigo.id/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ErrorLog ${APACHE_LOG_DIR}/dms_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/dms_ssl_access.log combined
</VirtualHost>
</IfModule>

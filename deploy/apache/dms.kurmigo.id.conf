<VirtualHost *:80>
    ServerName dms.kurmigo.id
    DocumentRoot /var/www/kurmigo-dms/public

    <Directory /var/www/kurmigo-dms/public>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/dms_error.log
    CustomLog ${APACHE_LOG_DIR}/dms_access.log combined

    RewriteEngine on
    RewriteCond %{SERVER_NAME} =dms.kurmigo.id
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
